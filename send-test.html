<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Saako Send Test</title>
    <style>
      body { font-family: system-ui, sans-serif; margin: 32px; max-width: 720px; }
      label { display: block; margin: 16px 0 6px; }
      input, select, textarea, button { width: 100%; padding: 10px; font-size: 1rem; box-sizing: border-box; }
      textarea { min-height: 120px; }
      button { margin-top: 18px; cursor: pointer; }
      .result { margin-top: 18px; white-space: pre-wrap; background: #f5f5f5; padding: 16px; border-radius: 8px; }
    </style>
  </head>
  <body>
    <h1>Saako Send Test</h1>
    <p>Send either SMS or WhatsApp to <strong>+233545029200</strong>.</p>
    <form id="sendForm">
      <label for="channel">Channel</label>
      <select id="channel" name="channel">
        <option value="sms">SMS</option>
        <option value="whatsapp">WhatsApp</option>
      </select>
      <label for="to">To</label>
      <input id="to" name="to" value="+233545029200" placeholder="+233545029200" required />
      <label for="message">Message</label>
      <textarea id="message" name="message">Hello from Saako! This is a test message.</textarea>
      <button type="submit">Send message</button>
    </form>
    <div class="result" id="result">Ready to send.</div>
    <script>
      const form = document.getElementById('sendForm');
      const result = document.getElementById('result');




      form.addEventListener('submit', async (event) => {
        event.preventDefault();
        result.textContent = 'Sending...';
        const payload = {
          channel: document.getElementById('channel').value,
          to: document.getElementById('to').value.trim(),
          message: document.getElementById('message').value.trim(),
        };




        try {
          const response = await fetch('/api/send-sms', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload),
          });
          const data = await response.json();
          if (!response.ok) {
            result.textContent = 'Error: ' + (data.error || response.statusText);
            return;
          }
          result.textContent = 'Sent successfully! SID: ' + data.sid + '\nChannel: ' + data.channel;
        } catch (err) {
          result.textContent = 'Request failed: ' + err.message;
        }
      });
    </script>
  </body>
</html>
